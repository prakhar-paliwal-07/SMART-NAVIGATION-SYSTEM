<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIT Bhopal Smart Campus</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --vit-blue: #003366; --vit-gold: #ffcc00; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { background: var(--vit-blue); color: white; padding: 15px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        
        #main-container { display: flex; flex: 1; overflow: hidden; }
        #sidebar { width: 350px; background: white; border-right: 1px solid #ddd; padding: 20px; overflow-y: auto; }
        #map { flex: 1; background: #e5e3df; }

        .location-card { 
            border: 1px solid #eee; padding: 15px; margin-bottom: 15px; 
            border-radius: 10px; cursor: pointer; transition: 0.3s;
        }
        .location-card:hover { border-color: var(--vit-blue); background: #f0f4ff; }
        .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 0.8rem; font-weight: bold; }
        .available { background: #d4edda; color: #155724; }
        
        .booking-modal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; padding: 30px; border-radius: 15px; box-shadow: 0 0 20px rgba(0,0,0,0.3);
            display: none; z-index: 1000; width: 300px;
        }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; z-index: 999; }
        
        button { background: var(--vit-blue); color: white; border: none; padding: 10px 15px; border-radius: 5px; width: 100%; cursor: pointer; margin-top: 10px; }
        input, select { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
    </style>
</head>
<body>

<header>
    <h1>VITB Smart Campus Navigator</h1>
</header>

<div id="main-container">
    <div id="sidebar">
        <h3>Campus Resources</h3>
        <div id="resource-list">
            </div>
    </div>
    <div id="map"></div>
</div>

<div class="overlay" id="overlay"></div>
<div class="booking-modal" id="modal">
    <h2 id="modal-title">Book Slot</h2>
    <p id="modal-desc"></p>
    <label>Registration No:</label>
    <input type="text" id="regNo" placeholder="e.g. 22BCE10XXX">
    <label>Select Time:</label>
    <select id="timeSlot">
        <option>09:00 AM - 10:00 AM</option>
        <option>10:00 AM - 11:00 AM</option>
        <option>04:00 PM - 05:00 PM</option>
        <option>05:00 PM - 06:00 PM</option>
    </select>
    <button onclick="processBooking()">Confirm Reservation</button>
    <button style="background:#666;" onclick="closeModal()">Cancel</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    // 1. VIT BHOPAL DATA
    const locations = [
        { name: "AB-1 Library", coords: [23.0565, 76.8505], cat: "Academic", info: "Silent Zone" },
        { name: "AB-2 Library", coords: [23.0575, 76.8515], cat: "Academic", info: "Digital Resources" },
        { name: "Lab Complex", coords: [23.0585, 76.8525], cat: "Lab", info: "Engineering Labs" },
        { name: "Architecture Block", coords: [23.0555, 76.8495], cat: "Academic", info: "Studio Space" },
        { name: "Badminton Court", coords: [23.0545, 76.8485], cat: "Sports", info: "Indoor Court" },
        { name: "Gym (Fitness Center)", coords: [23.0540, 76.8480], cat: "Sports", info: "Modern Equipment" },
        { name: "Basketball Court", coords: [23.0535, 76.8475], cat: "Sports", info: "Outdoor" },
        { name: "Open Auditorium", coords: [23.0525, 76.8465], cat: "Events", info: "Gatherings" }
    ];

    // 2. INITIALIZE MAP (Centered on VIT Bhopal coordinates)
    var map = L.map('map').setView([23.0560, 76.8500], 16);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    const listDiv = document.getElementById('resource-list');

    // 3. LOAD UI
    locations.forEach((loc, index) => {
        // Add Marker to Map
        let marker = L.marker(loc.coords).addTo(map);
        marker.bindPopup(`<b>${loc.name}</b><br>${loc.info}`);

        // Add Card to Sidebar
        let card = document.createElement('div');
        card.className = 'location-card';
        card.innerHTML = `
            <span class="status-badge available">Live Availability</span>
            <h4>${loc.name}</h4>
            <p style="font-size:0.8rem; color:#666;">${loc.cat} • ${loc.info}</p>
            <button onclick="openBooking('${loc.name}')">Book Now</button>
        `;
        listDiv.appendChild(card);
    });

    // 4. BOOKING LOGIC (Front-end Simulation)
    function openBooking(name) {
        document.getElementById('modal-title').innerText = "Booking: " + name;
        document.getElementById('modal').style.display = 'block';
        document.getElementById('overlay').style.display = 'block';
    }

    function closeModal() {
        document.getElementById('modal').style.display = 'none';
        document.getElementById('overlay').style.display = 'none';
    }

    function processBooking() {
        const reg = document.getElementById('regNo').value;
        if(!reg) { alert("Please enter your Reg No!"); return; }
        
        // Simulating Conflict Resolution (Network Delay)
        alert("Connecting to Campus Server...");
        setTimeout(() => {
            alert("SUCCESS! Slot Reserved for " + reg + ". Check your VIT Mail.");
            closeModal();
        }, 1000);
    }
</script>
</body>
</html>
